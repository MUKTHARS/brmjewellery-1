upstream frontend {
  server frontend:3000;
  keepalive 32;
}

upstream backend {
  server backend:4000;
  keepalive 32;
}

# ─── HTTP → HTTPS redirect (comment out if no SSL) ───────────────────────────
# server {
#   listen 80;
#   server_name brmjewellery.co.uk www.brmjewellery.co.uk;
#   return 301 https://$host$request_uri;
# }

# ─── Main Server Block ────────────────────────────────────────────────────────
server {
  listen 80;
  # listen 443 ssl http2;
  server_name brmjewellery.co.uk www.brmjewellery.co.uk localhost;

  # SSL — uncomment when certificate is available
  # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  # ssl_protocols       TLSv1.2 TLSv1.3;
  # ssl_ciphers         HIGH:!aNULL:!MD5;
  # ssl_session_cache   shared:SSL:10m;
  # ssl_session_timeout 10m;

  # ── Static file uploads served directly by NGINX ──────────────────────────
  location /uploads/ {
    alias /var/www/uploads/;
    expires 7d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Stripe webhook — raw body, no buffering ───────────────────────────────
  location /api/v1/payment/webhook {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    # Do NOT buffer — Stripe needs the raw body for signature verification
    proxy_request_buffering off;
  }

  # ── Auth endpoints — stricter rate limiting ───────────────────────────────
  location ~ ^/api/v1/auth/(login|register|forgot-password) {
    limit_req zone=auth burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── API routes → Express backend ─────────────────────────────────────────
  location /api/ {
    limit_req zone=api burst=50 nodelay;
    limit_req_status 429;

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # ── Next.js static assets ─────────────────────────────────────────────────
  location /_next/static/ {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Next.js HMR / WebSocket (dev only) ───────────────────────────────────
  location /_next/webpack-hmr {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # ── Everything else → Next.js frontend ───────────────────────────────────
  location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
